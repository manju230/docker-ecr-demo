name: Build and Push Docker Image to ECR
on:
push:
branches:
- main
permissions:
id-token: write
contents: read
jobs:
build:
runs-on: ubuntu-latest
steps:
- name: Checkout repository
 uses: actions/checkout@v3
- name: Configure AWS credentials using OIDC
 uses: aws-actions/configure-aws-credentials@v2
 with:
   role-to-assume: arn:aws:iam::123456789012:role/github-ecr-role
   aws-region: ap-south-1
- name: Login to ECR
 id: login-ecr
 uses: aws-actions/amazon-ecr-login@v1
- name: Build Docker Image
 run: docker build -t my-app .
- name: Tag Docker Image
 run: docker tag my-app:latest ${{ steps.login-ecr.outputs.registry }}/my-docker-app:latest
- name: Push Docker Image
 run: docker push ${{ steps.login-ecr.outputs.registry }}/my-docker-app:latest
